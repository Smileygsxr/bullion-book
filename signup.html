<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bullion Book</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="auth-card">
        <div class="auth-brand">
            <i class="fa-solid fa-coins"></i>
            <span>Bullion Book</span>
        </div>

        <h1 class="auth-title">Create Your Account</h1>
        <p class="auth-subtitle">Start tracking your trades in minutes.</p>

        <div class="auth-error" id="auth-error"></div>

        <button class="auth-btn-google" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Sign up with Google
        </button>

        <div class="auth-divider">Or</div>

        <form id="signup-form">
            <div class="auth-field">
                <label class="auth-label" for="signup-email">Email</label>
                <input class="auth-input" type="email" id="signup-email" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="signup-password">Password</label>
                <input class="auth-input" type="password" id="signup-password" minlength="6" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="signup-confirm-password">Confirm Password</label>
                <input class="auth-input" type="password" id="signup-confirm-password" minlength="6" required>
            </div>

            <button class="auth-btn-submit" type="submit">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </button>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;
            if (password !== confirmPassword) {
                showAuthError('Passwords do not match.');
                return;
            }
            signUpWithEmail(document.getElementById('signup-email').value, password);
        });
    </script>

</body>
</html>
