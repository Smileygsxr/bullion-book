name: Fetch Daily XAUUSD Data

on:
  # Cron trigger disabled - daily chart/news data now comes from the MT5
  # scripts (mt5_fetch_button.bat + Export_USD_Calendar.mq5) instead.
  # workflow_dispatch below is kept so this can still be run manually
  # (e.g. a one-off backfill) if ever needed.
  workflow_dispatch:
    inputs:
      backfill_start:
        description: 'Backfill start date (YYYY-MM-DD) - leave blank for the normal "last 7 days" run'
        required: false
        default: ''
      backfill_end:
        description: 'Backfill end date (YYYY-MM-DD) - leave blank to use today'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch XAUUSD data (1m, 5m, 15m)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start }}
          BACKFILL_END: ${{ github.event.inputs.backfill_end }}
        run: python scripts/fetch_daily_gold_data.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Add XAUUSD chart data"
            git push
          else
            echo "No new data to commit."
          fi
