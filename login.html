<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Bullion Book</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="auth-card">
        <div class="auth-brand">
            <i class="fa-solid fa-coins"></i>
            <span>Bullion Book</span>
        </div>

        <h1 class="auth-title">Hi, Welcome Back!</h1>
        <p class="auth-subtitle">Enter your credentials to access your account.</p>

        <div class="auth-error" id="auth-error"></div>

        <button class="auth-btn-google" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Log in with Google
        </button>

        <div class="auth-divider">Or</div>

        <form id="login-form">
            <div class="auth-field">
                <label class="auth-label" for="login-email">Email</label>
                <input class="auth-input" type="email" id="login-email" required>
            </div>

            <div class="auth-field">
                <div class="auth-field-row">
                    <label class="auth-label" for="login-password">Password</label>
                    <a class="auth-forgot-link" onclick="sendPasswordReset(document.getElementById('login-email').value)">Forgot password?</a>
                </div>
                <input class="auth-input" type="password" id="login-password" required>
            </div>

            <button class="auth-btn-submit" type="submit">
                <i class="fa-solid fa-lock"></i> Login
            </button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            loginWithEmail(
                document.getElementById('login-email').value,
                document.getElementById('login-password').value
            );
        });
    </script>

</body>
</html>
